name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: SWI-Prolog and XPCE
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install SWI-Prolog, XPCE, and virtual display
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            swi-prolog-x \
            xauth \
            xvfb

      - name: Show SWI-Prolog version
        run: swipl --version

      - name: Run test suite
        run: xvfb-run --auto-servernum make test SWIPL=/usr/bin/swipl
